<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Veritas</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 270px;
      background: #0d0d1a;
      color: #e2e2f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 18px;
    }
    .header { display:flex; align-items:center; gap:11px; margin-bottom:18px; }
    .logo {
      width:34px; height:34px;
      background:linear-gradient(135deg,#6c5ce7,#a78bfa);
      border-radius:9px;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; font-weight:900; color:#fff;
    }
    .title { font-size:15px; font-weight:700; }
    .subtitle { font-size:11px; color:#555570; margin-top:2px; }

    .card {
      background:#12121f; border:1px solid #22223a;
      border-radius:9px; padding:13px; margin-bottom:12px;
    }
    .card-label {
      font-size:10px; font-weight:700; letter-spacing:1px;
      text-transform:uppercase; color:#3d3d5c; margin-bottom:9px;
    }
    .step { display:flex; align-items:flex-start; gap:9px; padding:5px 0; }
    .step-n {
      width:17px; height:17px; background:#1a1a30;
      border:1px solid #3a3a5c; border-radius:50%;
      font-size:10px; font-weight:700; color:#7c6fcd;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; margin-top:1px;
    }
    .step-text { font-size:12px; color:#9898b8; line-height:1.4; }

    .status {
      display:flex; align-items:center; gap:8px;
      padding:9px 11px;
      background:#091a10; border:1px solid #14472a;
      border-radius:8px; font-size:12px; color:#22c55e;
      margin-bottom:14px;
    }
    .status-dot {
      width:6px; height:6px; background:#22c55e; border-radius:50%;
      animation:pulse 1.8s ease infinite; flex-shrink:0;
      box-shadow:0 0 5px #22c55e;
    }
    @keyframes pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(34,197,94,.6); }
      50%      { box-shadow:0 0 0 4px rgba(34,197,94,0); }
    }

    /* API config */
    .api-label {
      font-size:10px; font-weight:700; letter-spacing:1px;
      text-transform:uppercase; color:#3d3d5c; margin-bottom:7px;
    }
    .api-row { display:flex; align-items:center; gap:7px; margin-bottom:9px; }
    .api-row label { font-size:11px; color:#555570; flex-shrink:0; font-weight:600; }
    .api-row input {
      flex:1; background:#12121f; border:1px solid #22223a;
      border-radius:6px; color:#c8c8e8; font-size:12px;
      padding:6px 8px; outline:none; font-family:monospace;
    }
    .api-row input:focus { border-color:#6c5ce7; box-shadow:0 0 0 2px rgba(108,92,231,.2); }
    .save-btn {
      width:100%; padding:8px;
      background:linear-gradient(135deg,#6c5ce7,#8b5cf6);
      border:none; border-radius:7px; color:#fff;
      font-size:13px; font-weight:700; cursor:pointer;
      font-family: 'Segoe UI', system-ui, sans-serif;
      transition:opacity .15s;
    }
    .save-btn:hover { opacity:.9; }
    .saved { font-size:11px; color:#22c55e; text-align:center; margin-top:6px; height:14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">V</div>
    <div>
      <div class="title">Veritas</div>
      <div class="subtitle">Fake News Detector</div>
    </div>
  </div>

  <div class="status">
    <div class="status-dot"></div>
    Extension is active
  </div>

  <div class="card">
    <div class="card-label">How to use</div>
    <div class="step">
      <div class="step-n">1</div>
      <div class="step-text">Select any text on the page (min. 30 chars)</div>
    </div>
    <div class="step">
      <div class="step-n">2</div>
      <div class="step-text">Click the <strong style="color:#a78bfa">Check</strong> button that appears</div>
    </div>
    <div class="step">
      <div class="step-n">3</div>
      <div class="step-text">View the result — then click <strong style="color:#a78bfa">Deep Analysis</strong> for LLM insights</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
